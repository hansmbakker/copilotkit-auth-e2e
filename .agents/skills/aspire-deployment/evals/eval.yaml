name: aspire-deployment-eval
description: Evaluates the aspire-deployment skill for correct multi-target deployment guidance,
  pipeline step handling, and ensuring no handoff to azure-skills for Aspire deployments.
version: "1.0"
type: capability
tags:
  skill: aspire-deployment
config:
  runs: 3
  timeout: 120s
  executor: copilot-sdk
  model: gpt-5-mini
stimuli:
  - name: deploy-destroy-001
    prompt: I'm done with this preview deployment — how do I tear down everything Aspire provisioned?
    tags:
      priority: p1
      area:
        - core-flow
        - aspire-13-3
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: uses_aspire_destroy
        config:
          prompt: Does the assistant's response recommend `aspire destroy` (new in Aspire 13.3) as the way to
            tear down a deployed Aspire app? Answer based on intent.
      - type: output-not-contains
        config:
          substring: az group delete
        name: no_manual_teardown
      - type: output-not-contains
        config:
          substring: kubectl delete
      - type: output-not-contains
        config:
          substring: helm uninstall
      - type: output-not-contains
        config:
          substring: docker compose down
      - type: prompt
        name: knows_destroy_is_cross_target
        config:
          prompt: The assistant's response should mention that `aspire destroy` is the inverse of `aspire
            deploy` and works across deployment targets — Azure (resources deleted via Azure
            Resource Manager), Kubernetes/AKS (Helm releases uninstalled, namespaces removed), and
            Docker Compose (stacks stopped and removed). Bonus if it mentions the use case of CI
            cleanup or ephemeral preview deployments.
      - type: output-contains
        config:
          substring: aspire destroy
      - type: output-not-contains
        config:
          substring: az group delete
      - type: output-not-contains
        config:
          substring: kubectl delete
      - type: output-not-contains
        config:
          substring: helm uninstall
      - type: output-not-contains
        config:
          substring: docker compose down
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-azure-001
    prompt: Deploy my Aspire application to Azure Container Apps
    tags:
      priority: p0
      area: core-flow
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: uses_aspire_deploy
        config:
          prompt: Does the assistant's response recommend using 'aspire deploy' (or an equivalent Aspire CLI
            deployment command) to deploy the application to Azure? Answer based on the intent, not
            exact string matching.
      - type: output-not-contains
        config:
          substring: azd up
        name: no_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azd provision
      - type: output-not-contains
        config:
          substring: azure-prepare
        name: no_azure_skills
      - type: output-not-contains
        config:
          substring: azure-deploy
      - type: output-contains
        config:
          substring: aspire deploy
      - type: output-not-contains
        config:
          substring: azd up
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azd init
      - type: output-not-contains
        config:
          substring: azd provision
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-js-001
    prompt: I want to publish my Next.js app via my Aspire AppHost — what's the recommended approach?
    tags:
      priority: p1
      area:
        - knowledge
        - current-aspire
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: uses_addnextjsapp
        config:
          prompt: "Does the assistant's response recommend `AddNextJsApp(name, path)` as the first-class
            Next.js helper? It should also note the requirement that `next.config.js` set `output:
            \"standalone\"` so the build emits the standalone server, since `AddNextJsApp`
            auto-configures Next.js standalone publishing."
      - type: prompt
        name: knows_publishas_family
        config:
          prompt: "Bonus: does the assistant's response mention or describe the broader current `PublishAs*`
            family — `PublishAsStaticWebsite` (SPAs / Vite / Next.js export, preview),
            `PublishAsNodeServer` (pre-bundled Node entry-points like SSR / TanStack Start /
            SvelteKit), and `PublishAsPackageScript` (full Nitro Next.js, Remix, Astro SSR)? It does
            NOT need to mention all three to pass — recognizing at least one alternative shows
            awareness."
      - type: output-contains
        config:
          substring: AddNextJsApp
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-multi-001
    prompt: What deployment targets does Aspire support?
    tags:
      priority: p1
      area:
        - knowledge
        - aspire-13-3
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: mentions_all_targets
        config:
          prompt: Does the assistant's response mention Azure as a deployment target for Aspire applications?
            It should cover Azure Container Apps, Azure App Service, and Azure Kubernetes Service
            (AKS). Answer based on the intent, not exact string matching.
      - type: prompt
        name: knows_k8s_helm_native
        config:
          prompt: The assistant's response should explain that in Aspire 13.3, Kubernetes deployment is native
            and Helm-based — `aspire deploy` runs end-to-end after declaring an
            `AddKubernetesEnvironment` (or `AddAzureKubernetesEnvironment` for AKS) and
            `WithComputeEnvironment(...)`. It is acceptable (and correct) to note that the user
            still needs cluster credentials (e.g., kubeconfig context, or `az aks get-credentials`).
      - type: output-not-contains
        config:
          substring: kubectl apply
        name: no_manual_k8s_tooling
      - type: output-not-contains
        config:
          substring: helm install
      - type: output-contains
        config:
          substring: Azure
      - type: output-contains
        config:
          substring: Docker
      - type: output-contains
        config:
          substring: Kubernetes
      - type: output-not-contains
        config:
          substring: kubectl apply
      - type: output-not-contains
        config:
          substring: helm install
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-step-001
    prompt: I just need to re-seed the database, not redeploy everything
    tags:
      priority: p1
      area: core-flow
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: uses_aspire_do
        config:
          prompt: Does the assistant's response recommend using 'aspire do' (or an equivalent Aspire CLI
            command for running individual pipeline steps) rather than a full deployment? Answer
            based on the intent, not exact string matching.
      - type: prompt
        name: not_full_deploy
        config:
          prompt: Does the assistant's response use 'aspire do seed-data' or a similar named-step command
            rather than recommending a full 'aspire deploy' when the user only wants to re-run one
            pipeline step? Answer based on intent.
      - type: output-contains
        config:
          substring: aspire do
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-notool-001
    prompt: What tools do I need to deploy my Aspire app to Azure?
    tags:
      priority: p0
      area:
        - safety-guardrail
        - aspire-13-3
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: aspire_only
        config:
          prompt: The assistant's response should explain that Aspire handles Azure deployment natively via
            'aspire deploy' — the AppHost IS the deployment plan. It's fine to mention that `az
            login` (Azure credentials) is still needed.
      - type: output-not-contains
        config:
          substring: azd up
        name: no_external_tooling
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azd init
      - type: output-not-contains
        config:
          substring: azd provision
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
      - type: output-not-contains
        config:
          substring: kubectl apply
      - type: output-not-contains
        config:
          substring: helm install
      - type: output-contains
        config:
          substring: aspire deploy
      - type: output-not-contains
        config:
          substring: azd up
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azd init
      - type: output-not-contains
        config:
          substring: azd provision
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: kubectl apply
      - type: output-not-contains
        config:
          substring: helm install
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-list-steps-001
    prompt: Before I deploy, I want to understand what steps the pipeline will run and if there are any
      issues
    tags:
      priority: p1
      area: core-flow
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
    graders:
      - type: prompt
        name: uses_list_steps
        config:
          prompt: Does the assistant's response recommend using `aspire publish --list-steps` (or `aspire
            deploy --list-steps`, or another `--list-steps`-style pipeline inspection) to preview
            the deployment pipeline before actually deploying? It should suggest inspecting the
            pipeline first rather than jumping straight to `aspire deploy`. Answer based on intent —
            accept any phrasing that conveys previewing pipeline steps via the Aspire CLI's
            list-steps flag.
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: deploy-publish-001
    prompt: I just want to generate the deployment manifests without deploying
    tags:
      priority: p0
      area: core-flow
    environment:
      files:
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
          dest: csharp-apphost/MyApp.AppHost/MyApp.AppHost.csproj
        - src: ../../../evals/csharp-apphost/MyApp.AppHost/Program.cs
          dest: csharp-apphost/MyApp.AppHost/Program.cs
        - src: ../../../evals/csharp-apphost/aspire.config.json
          dest: csharp-apphost/aspire.config.json
    graders:
      - type: prompt
        name: uses_publish
        config:
          prompt: Does the assistant's response recommend using 'aspire publish' (or an equivalent Aspire CLI
            artifact generation command) to generate deployment manifests without deploying? Answer
            based on the intent, not exact string matching.
      - type: prompt
        name: distinguishes_publish_deploy
        config:
          prompt: The assistant's response should clearly distinguish between 'aspire publish' (artifact
            generation only) and 'aspire deploy' (full pipeline including deployment). It should use
            'aspire publish' since the user only wants artifacts.
      - type: output-contains
        config:
          substring: aspire publish
      - type: output-not-contains
        config:
          substring: azd up
        name: never_azd
      - type: output-not-contains
        config:
          substring: azd deploy
      - type: output-not-contains
        config:
          substring: azure-prepare
      - type: output-not-contains
        config:
          substring: azure-deploy
  - name: should_trigger_01
